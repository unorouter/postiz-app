name: Docker Prod

on:
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo JWT_SECRET=${{ secrets.POSTIZ_JWT_SECRET }} > .env
          echo POSTGRES_USER=${{ secrets.POSTIZ_POSTGRES_USER }} >> .env
          echo POSTGRES_PASSWORD=${{ secrets.POSTIZ_POSTGRES_PASSWORD }} >> .env
          echo POSTGRES_DB=${{ secrets.POSTIZ_POSTGRES_DB }} >> .env
          echo TEMPORAL_POSTGRES_USER=${{ secrets.POSTIZ_TEMPORAL_POSTGRES_USER }} >> .env
          echo TEMPORAL_POSTGRES_PASSWORD=${{ secrets.POSTIZ_TEMPORAL_POSTGRES_PASSWORD }} >> .env

      - name: Docker run prod
        run: docker compose -f docker-compose-traefik.yml up -d --force-recreate --build

      - name: remove unused images, containers, volumes, and networks
        run: docker image prune -a -f --filter "until=24h" && docker container prune -f --filter "until=24h" && docker volume prune -f && docker network prune -f --filter "until=24h"
