name: unorouter-postiz

networks:
  proxy:
    external: false
    name: proxy
  internal:
    driver: bridge

services:
  unorouter-postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: unorouter-postiz
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "5"
    networks:
      - proxy
      - internal
    volumes:
      - ~/postiz/config:/config
      - ~/postiz/uploads:/uploads
    environment:
      - MAIN_URL=https://social.unorouter.com
      - FRONTEND_URL=https://social.unorouter.com
      - NEXT_PUBLIC_BACKEND_URL=https://social.unorouter.com/api
      - BACKEND_INTERNAL_URL=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@unorouter-postiz-postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://unorouter-postiz-redis:6379
      - TEMPORAL_ADDRESS=unorouter-postiz-temporal:7233
      - TZ=Europe/Berlin
      - IS_GENERAL=true
      - DISABLE_REGISTRATION=true
      - STORAGE_PROVIDER=local
      - UPLOAD_DIRECTORY=/uploads
      - NEXT_PUBLIC_UPLOAD_DIRECTORY=/uploads
      - API_LIMIT=30
      - NX_ADD_PLUGINS=false
    labels:
      - "autoheal=true"
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.postiz.rule=Host(`social.unorouter.com`)"
      - "traefik.http.routers.postiz.entrypoints=websecure"
      - "traefik.http.routers.postiz.tls.certresolver=letsencrypt"
      - "traefik.http.services.postiz.loadbalancer.server.port=5000"
    depends_on:
      unorouter-postiz-postgres:
        condition: service_healthy
      unorouter-postiz-redis:
        condition: service_healthy
      unorouter-postiz-temporal:
        condition: service_started

  unorouter-postiz-redis:
    image: redis:7.2
    container_name: unorouter-postiz-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - internal
    volumes:
      - postiz_redis_data:/data

  unorouter-postiz-postgres:
    image: postgres:17-alpine
    container_name: unorouter-postiz-postgres
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postiz_pg_data:/var/lib/postgresql/data

  unorouter-postiz-temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: unorouter-postiz-temporal-elasticsearch
    restart: always
    networks:
      - internal
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    volumes:
      - postiz_temporal_es_data:/usr/share/elasticsearch/data

  unorouter-postiz-temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: unorouter-postiz-temporal
    restart: always
    networks:
      - internal
    depends_on:
      unorouter-postiz-temporal-postgres:
        condition: service_healthy
      unorouter-postiz-temporal-elasticsearch:
        condition: service_started
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=unorouter-postiz-temporal-postgres
      - ENABLE_ES=true
      - ES_SEEDS=unorouter-postiz-temporal-elasticsearch
      - ES_VERSION=v7
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - TZ=Europe/Berlin
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  unorouter-postiz-temporal-postgres:
    image: postgres:16-alpine
    container_name: unorouter-postiz-temporal-postgres
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_POSTGRES_USER}"]
      interval: 10s
      timeout: 3s
      retries: 3
    environment:
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
    volumes:
      - postiz_temporal_pg_data:/var/lib/postgresql/data

  unorouter-postiz-pgbackup:
    image: prodrigestivill/postgres-backup-local:17-alpine
    container_name: unorouter-postiz-pgbackup
    restart: always
    networks:
      - internal
    volumes:
      - ~/duplicati-volume/source/unorouter-postiz-pgbackup:/backups
    depends_on:
      - unorouter-postiz-postgres
    environment:
      - POSTGRES_HOST=unorouter-postiz-postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_EXTRA_OPTS=-Fc
      - SCHEDULE=0 0,12 * * *
      - BACKUP_KEEP_MINS=1440
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=0
      - HEALTHCHECK_PORT=8080

volumes:
  postiz_pg_data:
  postiz_redis_data:
  postiz_temporal_pg_data:
  postiz_temporal_es_data:
